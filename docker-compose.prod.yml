services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production

  frontend:
    build:
      context: ./frontend
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend